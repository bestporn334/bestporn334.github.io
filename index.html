<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

:root{
    --orange:#ff8c42;
    --orange2:#ffb76b;
    --glass:rgba(255,255,255,.09);
    --glass2:rgba(255,255,255,.04);
    --border:rgba(255,255,255,.16);
}

body{
    background:
        radial-gradient(circle at top,#3d1d0b 0%,#121212 40%),
        linear-gradient(#0e0e0e,#080808);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(60px);
    pointer-events:none;
}

header{
    position:sticky;
    top:0;
    z-index:50;

    padding:22px;

    backdrop-filter:blur(40px);
    background:rgba(20,20,20,.45);
    border-bottom:1px solid rgba(255,255,255,.08);
}

h1{
    font-size:34px;
    font-weight:700;
    color:var(--orange);
    letter-spacing:.3px;
}

.subtitle{
    opacity:.7;
    margin-top:4px;
}

.search{
    margin-top:20px;
}

.search input{
    width:100%;
    padding:15px 20px;

    border:none;
    outline:none;

    border-radius:18px;

    color:white;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(30px);

    font-size:15px;
}

.grid{

    max-width:1600px;
    margin:auto;

    padding:24px;

    display:grid;
    gap:22px;

    grid-template-columns:
        repeat(auto-fill,minmax(320px,1fr));
}

.card{

    overflow:hidden;

    border-radius:28px;

    background:linear-gradient(
        180deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,.04)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(40px);

    transition:.35s;
}

.card:hover{

    transform:
        translateY(-7px)
        scale(1.015);

    border-color:rgba(255,170,80,.55);

    box-shadow:
        0 20px 60px rgba(255,120,30,.22);
}

.preview{

    position:relative;
    overflow:hidden;
}

.preview video{

    width:100%;
    display:block;
    aspect-ratio:9/16;
    object-fit:cover;

    background:black;
}

.play{

    position:absolute;

    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:70px;

    color:white;

    text-shadow:0 5px 30px black;

    opacity:.9;

    pointer-events:none;
}

.info{
    padding:18px;
}

.name{

    color:var(--orange);

    font-weight:700;

    margin-bottom:10px;

    font-size:16px;

    word-break:break-word;
}

.meta{

    display:flex;

    flex-wrap:wrap;

    gap:8px;
}

.tag{

    padding:7px 12px;

    border-radius:999px;

    background:rgba(255,255,255,.07);

    font-size:12px;

    color:#ddd;
}

.buttons{

    display:flex;
    gap:10px;

    margin-top:18px;
}

button{

    flex:1;

    border:none;

    cursor:pointer;

    padding:12px;

    border-radius:16px;

    color:white;

    font-weight:600;

    transition:.25s;

    backdrop-filter:blur(20px);
}

.watch{

    background:linear-gradient(
        135deg,
        var(--orange),
        #ff6f3c
    );
}

.download{

    background:rgba(255,255,255,.08);
}

button:hover{

    transform:translateY(-2px);
}

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.72);

    display:none;

    align-items:center;
    justify-content:center;

    z-index:999;
}

.modal video{

    width:min(90vw,1000px);

    max-height:90vh;

    border-radius:24px;

    background:black;
}

.close{

    position:absolute;

    top:30px;
    right:30px;

    width:55px;
    height:55px;

    border-radius:50%;

    background:rgba(255,255,255,.12);

    display:grid;
    place-items:center;

    font-size:28px;

    cursor:pointer;
}

.empty{
    text-align:center;
    opacity:.5;
    padding:80px;
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#ff8c42;
    border-radius:999px;
}
</style>
</head>
<body>

<header>

<h1>Video Gallery</h1>
<div class="subtitle" id="count"></div>

<div class="search">
<input
id="search"
placeholder="Search videos..."
>
</div>

</header>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">

<div class="close" onclick="closePlayer()">✕</div>

<video
id="player"
controls
autoplay
playsinline
></video>

</div>

onmouseleave="this.pause();this.currentTime=0">
</video>

<div class="play">▶</div>

</div>

<div class="info">

<div class="name">${v.name}</div>

<div class="meta">

<div class="tag">${v.size||""}</div>

<div class="tag">${v.width}×${v.height}</div>

<div class="tag">${v.author||"Unknown"}</div>

</div>

<div class="buttons">

<button
class="watch"
onclick="playVideo('${v.video}')">
Watch
</button>

class="download"
onclick="window.open('${v.video}')">

</button>

`;

grid.appendChild(card);

});

}

function playVideo(url){

const player=document.getElementById("player");

player.src=url;

document.getElementById("modal").style.display="flex";

player.play();

}

function closePlayer(){

const player=document.getElementById("player");

player.pause();

player.src="";

document.getElementById("modal").style.display="none";

}

search.oninput=e=>{

const q=e.target.value.toLowerCase();

render(videos.filter(v=>

(v.name||"").toLowerCase().includes(q) ||

(v.author||"").toLowerCase().includes(q)

));

};

render(videos);

</script>
