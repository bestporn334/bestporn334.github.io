<style>
/* --- Design Token Engine --- */
:root {
    --liquid-bg: rgba(255, 255, 255, 0.015);
    --liquid-surface: rgba(255, 255, 255, 0.04);
    --liquid-border: rgba(255, 255, 255, 0.07);
    --liquid-border-hover: rgba(255, 255, 255, 0.22);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --ios-radius: 16px;
    --ios-radius-lg: 24px;
    --fluid-bezier: cubic-bezier(0.16, 1, 0.3, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background: radial-gradient(circle at 50% -20%, #14172e 0%, #040508 100%);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* --- Navigation --- */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 32px;
    background: rgba(4, 5, 8, 0.45);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    border-bottom: 1px solid var(--liquid-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.search-wrapper {
    flex: 1;
    max-width: 320px;
}

.search-wrapper input {
    width: 100%;
    padding: 10px 20px;
    background: var(--liquid-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--liquid-border);
    border-radius: var(--ios-radius-lg);
    color: #fff;
    font-size: 14px;
}

.pill-badge {
    font-size: 12px;
    font-weight: 500;
    background: var(--liquid-surface);
    backdrop-filter: blur(12px);
    padding: 8px 18px;
    border-radius: var(--ios-radius-lg);
    border: 1px solid var(--liquid-border);
    color: var(--text-secondary);
}

@media (max-width: 600px) {
    .pill-badge { display: none !important; }
}

/* --- Thumbnail Deck Canvas --- */
.grid-canvas {
    max-width: 1600px;
    margin: auto;
    padding: 32px;
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
}

.glass-deck-card {
    background: var(--liquid-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--liquid-border);
    border-radius: var(--ios-radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s var(--fluid-bezier);
}

.glass-deck-card:hover {
    transform: scale(1.03) translateY(-2px);
    border-color: var(--liquid-border-hover);
}

.media-window {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #010102;
    overflow: hidden;
}

.media-window video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none; 
}

.card-description-block {
    padding: 14px 18px 16px 18px;
}

.asset-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
}

.metadata-flex-row {
    display: flex;
    gap: 6px;
}

.ios-tag {
    font-size: 10px;
    background: rgba(255, 255, 255, 0.04);
    padding: 3px 8px;
    border-radius: 6px;
    color: var(--text-secondary);
}

/* --- Cinema View Layout Wrapper --- */
.cinema-canvas {
    display: none;
    width: 100%;
    max-width: 680px; 
    margin: 0 auto;
    padding: 20px 16px;
    flex-direction: column;
    gap: 14px;
    animation: stageIn 0.4s var(--fluid-bezier);
}

.liquid-action-btn {
    align-self: flex-start;
    background: var(--liquid-surface);
    backdrop-filter: blur(16px);
    border: 1px solid var(--liquid-border);
    color: var(--text-primary);
    padding: 8px 18px;
    border-radius: var(--ios-radius-lg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
}

/* --- Master Theater Enclosure Container --- */
.theater-enclosure {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: var(--ios-radius) !important;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    position: relative;
    
    /* Strict global masking to guarantee matching rounded corners on all children */
    overflow: hidden !important;
    clip-path: inset(0 round var(--ios-radius)) !important;
    -webkit-clip-path: inset(0 round var(--ios-radius)) !important;
}

/* --- Isolated Background Blur Layer --- */
.backdrop-blur-canvas {
    position: absolute !important;
    top: -10% !important;
    left: -10% !important;
    width: 120% !important;
    height: 120% !important;
    object-fit: cover !important;
    filter: blur(28px) brightness(0.5) saturate(130%) !important;
    z-index: 1 !important;
    pointer-events: none !important;
}

/* --- Isolated Foreground Component Layer --- */
video-player {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    display: block !important;
    z-index: 2 !important;
    background: transparent !important;
}

video-skin {
    display: block !important;
    width: 100% !important;
    height: 100% !important;
    position: relative !important;
    background: transparent !important;
}

/* Sharp Content Track with Dynamic Gradient Feathering Edges */
video-player video.fg-canvas-track {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    position: relative !important;
    background: transparent !important;
    pointer-events: auto !important;
    
    /* Dynamically blends video letterbox boundaries into the blur layer smoothly */
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%),
                linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%) !important;
    mask-composite: intersect !important;
    -webkit-mask-image: -webkit-linear-gradient(left, transparent 0%, black 8%, black 92%, transparent 100%),
                        -webkit-linear-gradient(top, transparent 0%, black 8%, black 92%, transparent 100%) !important;
    -webkit-mask-composite: source-in !important;
}

video-player video::-webkit-media-controls {
    display: none !important;
}

.cinema-header-title {
    font-size: 15px;
    font-weight: 700;
}

@keyframes stageIn {
    from { transform: scale(0.99) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}

.empty-state-notice {
    text-align: center;
    padding: 80px 0;
    color: var(--text-secondary);
    grid-column: 1/-1;
}
</style>
</head>

const mainGrid = document.getElementById("live-grid-container");
const searchEngineInput = document.getElementById("directory-search");
const layoutAssetCounter = document.getElementById("runtime-asset-counter");

function mountGrid(items) {
    mainGrid.innerHTML = "";
    layoutAssetCounter.textContent = `${items.length} files synchronized`;

    if (items.length === 0) {
        mainGrid.innerHTML = `<div class="empty-state-notice">Zero matching assets.</div>`;
        return;
    }

    items.forEach(item => {
        const structuralCard = document.createElement("div");
        structuralCard.className = "glass-deck-card";
        const virtualSlug = encodeURIComponent(item.name.replace(/\.[^/.]+$/, ""));
        structuralCard.onclick = () => routeToCinemaView(virtualSlug, item.name);

        structuralCard.innerHTML = `
            <div class="media-window">
                <video muted loop preload="metadata" src="${item.video}"></video>
            </div>
            <div class="card-description-block">
                <div class="asset-title">${item.name}</div>
                <div class="metadata-flex-row">
                    <span class="ios-tag">${item.size}</span>
                    <span class="ios-tag">${item.resolution}</span>
                </div>
            </div>
        `;
        mainGrid.appendChild(structuralCard);
    });

    initPrecisionHoverEngine();
}

function initPrecisionHoverEngine() {
    document.querySelectorAll('.media-window').forEach(windowNode => {
        const innerVideo = windowNode.querySelector('video');
        let executionTimer;

        windowNode.onmouseenter = () => {
            if (innerVideo.duration) { processMidpointPlayback(innerVideo); } 
            else { innerVideo.addEventListener('loadedmetadata', () => processMidpointPlayback(innerVideo), { once: true }); }
        };

        windowNode.onmouseleave = () => {
            clearTimeout(executionTimer);
            innerVideo.pause();
            innerVideo.currentTime = 0;
        };

        function processMidpointPlayback(v) {
            v.currentTime = v.duration / 2;
            v.play().then(() => {
                executionTimer = setTimeout(() => { v.pause(); v.currentTime = 0; }, 3000);
            }).catch(() => {});
        }
    });
}

function routeToCinemaView(slug, fullAssetIdentifier) {
    const assetInstance = registry.find(a => a.name === fullAssetIdentifier);
    if (!assetInstance) return;

    history.pushState({ layer: 'cinema', name: fullAssetIdentifier }, "", `./${slug}/`);
    renderCinemaViewport(assetInstance);
}

function executeBackNavigation() {
    const safeHomeSegment = window.location.pathname.replace(/\/[^\/]*\/?$/, '');
    history.pushState({ layer: 'deck' }, "", safeHomeSegment || '/');
    renderSystemDeck();
}

function renderSystemDeck() {
    document.getElementById("cinema-wrapper-view").style.display = "none";
    document.getElementById("global-navbar").style.display = "flex";
    document.getElementById("deck-wrapper-view").style.display = "block";
    document.getElementById("video-injection-nexus").innerHTML = ""; 
}

function renderCinemaViewport(targetAsset) {
    document.getElementById("deck-wrapper-view").style.display = "none";
    document.getElementById("global-navbar").style.display = "none";
    
    const viewportNode = document.getElementById("cinema-wrapper-view");
    viewportNode.style.display = "flex";

    document.getElementById("cinema-display-title").textContent = targetAsset.name;
    document.getElementById("cinema-display-metadata").innerHTML = `
        <span class="ios-tag">Weight: ${targetAsset.size}</span>
        <span class="ios-tag">Resolution: ${targetAsset.resolution}</span>
    `;

    const injectionPoint = document.getElementById("video-injection-nexus");
    
    // Decoupled Dom Layer Architecture: Blur is moved completely outside the custom web component layer
    injectionPoint.innerHTML = `
        <video class="backdrop-blur-canvas" id="bg-blur-track" src="${targetAsset.video}" muted loop playsinline></video>
        <video-player controls autoplay>
            <video-skin>
                <video class="fg-canvas-track" id="main-fg-track" src="${targetAsset.video}" playsinline></video>
            </video-skin>
        </video-player>
    `;

    function applyShadowGroundedFixes() {
        const targetVideo = injectionPoint.querySelector('#main-fg-track');
        const backgroundBlurTrack = injectionPoint.querySelector('#bg-blur-track');
        if (!targetVideo || !backgroundBlurTrack) return;

        // Force explicit layout rules down the component stack override
        targetVideo.style.setProperty('object-fit', 'contain', 'important');
        targetVideo.style.setProperty('width', '100%', 'important');
        targetVideo.style.setProperty('height', '100%', 'important');
        targetVideo.style.setProperty('background', 'transparent', 'important');

        // Master playback synchronization engine
        targetVideo.addEventListener('play', () => backgroundBlurTrack.play());
        targetVideo.addEventListener('pause', () => backgroundBlurTrack.pause());
        targetVideo.addEventListener('seeking', () => backgroundBlurTrack.currentTime = targetVideo.currentTime);
        targetVideo.addEventListener('timeupdate', () => {
            if (Math.abs(backgroundBlurTrack.currentTime - targetVideo.currentTime) > 0.15) {
                backgroundBlurTrack.currentTime = targetVideo.currentTime;
            }
        });
        
        if (!targetVideo.paused) { backgroundBlurTrack.play().catch(() => {}); }
    }

    // Run synchronization routine checks
    applyShadowGroundedFixes();
    const foregroundVideo = injectionPoint.querySelector('#main-fg-track');
    if (foregroundVideo) {
        foregroundVideo.addEventListener('loadedmetadata', applyShadowGroundedFixes);
        foregroundVideo.addEventListener('play', applyShadowGroundedFixes);
    }

    window.scrollTo({ top: 0, behavior: 'instant' });
}

searchEngineInput.oninput = (e) => {
    const rawQuery = e.target.value.toLowerCase().trim();
    mountGrid(registry.filter(a => a.name.toLowerCase().includes(rawQuery)));
};

window.onpopstate = (e) => {
    if (e.state && e.state.layer === 'cinema') {
        const correspondingRegistryObject = registry.find(a => a.name === e.state.name);
        if (correspondingRegistryObject) renderCinemaViewport(correspondingRegistryObject);
    } else {
        renderSystemDeck();
    }
};

const targetTerminatingSlug = window.location.pathname.split('/').filter(Boolean).pop();
const validatedBootRoute = registry.find(a => encodeURIComponent(a.name.replace(/\.[^/.]+$/, "")) === targetTerminatingSlug);

if (validatedBootRoute) {
    renderCinemaViewport(validatedBootRoute);
} else {
    mountGrid(registry);
}
</script>
</body>
</html>
