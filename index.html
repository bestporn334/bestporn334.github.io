<style>
/* --- Design Token Engine (iOS Comfort + Liquid Glass) --- */
:root {
    --liquid-bg: rgba(255, 255, 255, 0.03);
    --liquid-surface: rgba(255, 255, 255, 0.05);
    --liquid-border: rgba(255, 255, 255, 0.1);
    --liquid-border-glow: rgba(255, 255, 255, 0.25);
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.3);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --ios-curve-lg: 24px;
    --ios-curve-md: 16px;
    --ios-curve-sm: 10px;
    --fluid-transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background: radial-gradient(circle at 50% -20%, #1a1d36 0%, #07080d 100%);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* --- Navigation Infrastructure --- */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 32px;
    background: rgba(7, 8, 13, 0.35);
    backdrop-filter: blur(30px) saturate(140%);
    -webkit-backdrop-filter: blur(30px) saturate(140%);
    border-bottom: 1px solid var(--liquid-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.search-wrapper {
    flex: 1;
    max-width: 360px;
}

.search-wrapper input {
    width: 100%;
    padding: 10px 20px;
    background: var(--liquid-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--liquid-border);
    border-radius: var(--ios-curve-lg);
    color: #fff;
    font-size: 14px;
    transition: var(--fluid-transition);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
}

.search-wrapper input:focus {
    outline: none;
    border-color: var(--liquid-border-glow);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,0.05);
    transform: translateY(-1px);
}

.pill-badge {
    font-size: 12px;
    font-weight: 500;
    background: var(--liquid-surface);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: var(--ios-curve-lg);
    border: 1px solid var(--liquid-border);
    color: var(--text-secondary);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

/* --- High Presence Thumbnail Grid Layout (+10% Larger Screen Footprint) --- */
.grid-canvas {
    max-width: 1650px;
    margin: auto;
    padding: 32px;
    display: grid;
    gap: 20px;
    /* Scaled from 190px to 220px to increase visual hierarchy */
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}

.glass-deck-card {
    background: var(--liquid-bg);
    backdrop-filter: blur(20px) saturate(120%);
    -webkit-backdrop-filter: blur(20px) saturate(120%);
    border: 1px solid var(--liquid-border);
    border-radius: var(--ios-curve-lg);
    overflow: hidden;
    cursor: pointer;
    transition: var(--fluid-transition);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 4px 24px rgba(0,0,0,0.2);
}

.glass-deck-card:hover {
    transform: scale(1.04) translateY(-4px);
    border-color: var(--liquid-border-glow);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 3px rgba(255,255,255,0.15), 0 20px 40px rgba(0, 0, 0, 0.4);
}

.media-window {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #020204;
    overflow: hidden;
    border-bottom: 1px solid var(--liquid-border);
}

.media-window video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.glass-deck-card:hover .media-window video {
    transform: scale(1.05);
}

.card-description-block {
    padding: 14px 16px;
}

.asset-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
}

.metadata-flex-row {
    display: flex;
    gap: 6px;
}

.ios-tag {
    font-size: 10px;
    font-weight: 500;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 3px 8px;
    border-radius: var(--ios-curve-sm);
    color: var(--text-secondary);
}

/* --- Modern Cinematic Viewport Screen --- */
.cinema-canvas {
    display: none;
    max-width: 1100px;
    margin: auto;
    padding: 48px 24px;
    flex-direction: column;
    gap: 24px;
    animation: stageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Liquid UI High-Gloss Capsule Button */
.liquid-action-btn {
    align-self: flex-start;
    background: var(--liquid-surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--liquid-border);
    color: var(--text-primary);
    padding: 10px 24px;
    border-radius: var(--ios-curve-lg);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    cursor: pointer;
    transition: var(--fluid-transition);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 4px 12px rgba(0,0,0,0.15);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.liquid-action-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--liquid-border-glow);
    transform: translateY(-2px);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 12px 24px rgba(0, 0, 0, 0.3);
}

.liquid-action-btn:active {
    transform: translateY(0);
}

.theater-enclosure {
    width: 100%;
    background: #000;
    border-radius: var(--ios-curve-lg);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative;
}

/* --- Dynamic Structural Correctives for VideoJS Node --- */
video-player {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
}

video-skin, video-skin video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* Custom Controls Integration Skin Overlay Fixes */
video::-webkit-media-controls-panel {
    background-image: linear-gradient(transparent, rgba(0,0,0,0.85)) !important;
}

.cinema-header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-top: 4px;
}

/* --- Keyframe Animation Architecture --- */
@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes stageIn {
    from { transform: scale(0.97) translateY(15px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}

.empty-state-notice {
    text-align: center;
    padding: 80px 0;
    color: var(--text-secondary);
    font-size: 14px;
    grid-column: 1/-1;
}

const mainGrid = document.getElementById("live-grid-container");
const searchEngineInput = document.getElementById("directory-search");
const layoutAssetCounter = document.getElementById("runtime-asset-counter");

// --- Generate UI Core Grid Array Layout ---
function mountGrid(items) {
    mainGrid.innerHTML = "";
    layoutAssetCounter.textContent = `${items.length} dynamic files active`;

    if (items.length === 0) {
        mainGrid.innerHTML = `<div class="empty-state-notice">Zero structural files match query parameters.</div>`;
        return;
    }

    items.forEach(item => {
        const structuralCard = document.createElement("div");
        structuralCard.className = "glass-deck-card";
        
        const virtualSlug = encodeURIComponent(item.name.replace(/\.[^/.]+$/, ""));
        structuralCard.onclick = () => routeToCinemaView(virtualSlug, item.name);

        structuralCard.innerHTML = `
            <div class="media-window">
                <video muted loop preload="metadata" src="${item.video}"></video>
            </div>
            <div class="card-description-block">
                <div class="asset-title">${item.name}</div>
                <div class="metadata-flex-row">
                    <span class="ios-tag">${item.size}</span>
                    <span class="ios-tag">${item.resolution}</span>
                </div>
            </div>
        `;
        mainGrid.appendChild(structuralCard);
    });

    initPrecisionHoverEngine();
}

// --- Dynamic Continuous Hover Sample Processing ---
function initPrecisionHoverEngine() {
    document.querySelectorAll('.media-window').forEach(windowNode => {
        const innerVideo = windowNode.querySelector('video');
        let executionTimer;

        windowNode.onmouseenter = () => {
            if (innerVideo.duration) {
                processMidpointPlayback(innerVideo);
            } else {
                innerVideo.addEventListener('loadedmetadata', () => processMidpointPlayback(innerVideo), { once: true });
            }
        };

        windowNode.onmouseleave = () => {
            clearTimeout(executionTimer);
            innerVideo.pause();
            innerVideo.currentTime = 0;
        };

        function processMidpointPlayback(v) {
            const strategicMidpoint = v.duration / 2;
            v.currentTime = strategicMidpoint;
            
            v.play().then(() => {
                executionTimer = setTimeout(() => {
                    v.pause();
                    v.currentTime = 0;
                }, 3000); // 3000ms execution cap
            }).catch(() => {});
        }
    });
}

// --- Dynamic Push State Routing Framework ---
function routeToCinemaView(slug, fullAssetIdentifier) {
    const assetInstance = registry.find(a => a.name === fullAssetIdentifier);
    if (!assetInstance) return;

    history.pushState({ layer: 'cinema', name: fullAssetIdentifier }, "", `./${slug}/`);
    renderCinemaViewport(assetInstance);
}

function executeBackNavigation() {
    const safeHomeSegment = window.location.pathname.replace(/\/[^\/]*\/?$/, '');
    history.pushState({ layer: 'deck' }, "", safeHomeSegment || '/');
    renderSystemDeck();
}

function renderSystemDeck() {
    document.getElementById("cinema-wrapper-view").style.display = "none";
    document.getElementById("global-navbar").style.display = "flex";
    document.getElementById("deck-wrapper-view").style.display = "block";
    document.getElementById("video-injection-nexus").innerHTML = ""; // Complete garbage collection
}

function renderCinemaViewport(targetAsset) {
    document.getElementById("deck-wrapper-view").style.display = "none";
    document.getElementById("global-navbar").style.display = "none";
    
    const viewportNode = document.getElementById("cinema-wrapper-view");
    viewportNode.style.display = "flex";

    document.getElementById("cinema-display-title").textContent = targetAsset.name;
    document.getElementById("cinema-display-metadata").innerHTML = `
        <span class="ios-tag">Size Weight: ${targetAsset.size}</span>
        <span class="ios-tag">Dimensions: ${targetAsset.resolution}</span>
    `;

    // High fidelity framework configuration mapping exactly to parameters requested
    document.getElementById("video-injection-nexus").innerHTML = `
        <video-player>
          <video-skin>
            <video src="${targetAsset.video}" playsinline controls autoplay></video>
          </video-skin>
        </video-player>
    `;
    window.scrollTo({ top: 0, behavior: 'instant' });
}

// --- Live Evaluator Query Execution Hook ---
searchEngineInput.oninput = (e) => {
    const rawQuery = e.target.value.toLowerCase().trim();
    mountGrid(registry.filter(a => a.name.toLowerCase().includes(rawQuery)));
};

// --- Physical Popstate Navigation Interceptor ---
window.onpopstate = (e) => {
    if (e.state && e.state.layer === 'cinema') {
        const correspondingRegistryObject = registry.find(a => a.name === e.state.name);
        if (correspondingRegistryObject) renderCinemaViewport(correspondingRegistryObject);
    } else {
        renderSystemDeck();
    }
};

// --- Initial Runtime Verification Engine ---
const targetTerminatingSlug = window.location.pathname.split('/').filter(Boolean).pop();
const validatedBootRoute = registry.find(a => encodeURIComponent(a.name.replace(/\.[^/.]+$/, "")) === targetTerminatingSlug);

if (validatedBootRoute) {
    renderCinemaViewport(validatedBootRoute);
} else {
    mountGrid(registry);
}
</script>
</body>
</html>
