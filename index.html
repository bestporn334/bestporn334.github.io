<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Studio Vault</title>

<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>

<style>
/* --- Premium Ambient Dark Background --- */
:root {
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-btn: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.08);
    --accent: #6366f1; /* Indigo Liquid Glow */
    --accent-glass: rgba(99, 102, 241, 0.15);
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background: radial-gradient(circle at 50% 0%, #111424 0%, #07080d 100%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
}

/* --- Frosted Glass Header --- */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 12px 24px;
    background: rgba(7, 8, 13, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.search-container {
    flex: 1;
    max-width: 320px;
}

.search-container input {
    width: 100%;
    padding: 8px 16px;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; /* Liquid capsule style */
    color: #fff;
    font-size: 13px;
    transition: all 0.3s ease;
}

.search-container input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 15px var(--accent-glass);
}

.counter-badge {
    font-size: 11px;
    background: var(--glass-btn);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    letter-spacing: 0.5px;
}

/* --- Ultra-Compact Grid Deck --- */
.deck {
    max-width: 1600px;
    margin: auto;
    padding: 24px;
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
}

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.glass-card:hover {
    transform: scale(1.02);
    border-color: rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.thumb-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
}

.thumb-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

.card-meta {
    padding: 8px 12px;
}

.video-label {
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

.tag-row {
    display: flex;
    gap: 4px;
}

.micro-tag {
    font-size: 9px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--text-dim);
}

/* --- Isolated Theatre View Layout --- */
.theatre-container {
    display: none;
    max-width: 960px;
    margin: auto;
    padding: 40px 24px;
    flex-direction: column;
    gap: 16px;
}

/* Fluid Liquid Glass Button styling */
.liquid-back-btn {
    align-self: flex-start;
    background: var(--glass-btn);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--text-main);
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}

.liquid-back-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.player-stage {
    width: 100%;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

/* --- Enforce Perfect VideoJS Skin Component Fit --- */
video-player {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
}
video-skin, video-skin video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.theatre-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
}

.no-results {
    text-align: center;
    padding: 64px;
    color: var(--text-dim);
    font-size: 13px;
    grid-column: 1/-1;
}
</style>
</head>

    <div class="search-container">

    </div>
    <div class="counter-badge" id="asset-count">0 items loaded</div>

</div>

    <div class="theatre-title" id="theatre-title-text"></div>

const deckGrid = document.getElementById("deck-grid");
const liveFilter = document.getElementById("live-filter");
const assetCount = document.getElementById("asset-count");

// --- Render Mini Card Gallery Layout ---
function buildDeck(items) {
    deckGrid.innerHTML = "";
    assetCount.textContent = `${items.length} files matched`;

    if (items.length === 0) {
        deckGrid.innerHTML = `<div class="no-results">No matches found in database.</div>`;
        return;
    }

    items.forEach(item => {
        const card = document.createElement("div");
        card.className = "glass-card";
        
        // Dynamic router URL parsing pattern
        const pathSlug = encodeURIComponent(item.name.replace(/\.[^/.]+$/, ""));
        card.onclick = () => pushViewRoute(pathSlug, item.name);

        card.innerHTML = `
            <div class="thumb-frame">
                <video muted loop preload="metadata" src="${item.video}"></video>
            </div>
            <div class="card-meta">
                <div class="video-label">${item.name}</div>
                <div class="tag-row">
                    <span class="micro-tag">${item.size}</span>
                    <span class="micro-tag">${item.res}</span>
                </div>
            </div>
        `;
        deckGrid.appendChild(card);
    });

    bindPrecisionHoverEngine();
}

// --- Strict 3-Second Center-Playback Preview Hook ---
function bindPrecisionHoverEngine() {
    document.querySelectorAll('.thumb-frame').forEach(frame => {
        const video = frame.querySelector('video');
        let timer;

        frame.onmouseenter = () => {
            if (video.duration) {
                seekAndPlay(video);
            } else {
                video.addEventListener('loadedmetadata', () => seekAndPlay(video), { once: true });
            }
        };

        frame.onmouseleave = () => {
            clearTimeout(timer);
            video.pause();
            video.currentTime = 0;
        };

        function seekAndPlay(v) {
            const midpoint = v.duration / 2;
            v.currentTime = midpoint;
            
            v.play().then(() => {
                timer = setTimeout(() => {
                    v.pause();
                    v.currentTime = 0;
                }, 3000); // Caps snippet review precisely at 3s
            }).catch(() => {});
        }
    });
}

// --- Routing Mechanism ---
function pushViewRoute(slug, filename) {
    const targetAsset = assets.find(a => a.name === filename);
    if (!targetAsset) return;

    // Forces beautiful directory navigation change without reloading
    history.pushState({ screen: 'player', name: filename }, "", `./${slug}/`);
    renderTheatreScreen(targetAsset);
}

function popStateToHome() {
    const cleanHomePath = window.location.pathname.replace(/\/[^\/]*\/?$/, '');
    history.pushState({ screen: 'gallery' }, "", cleanHomePath || '/');
    renderGalleryDeck();
}

function renderGalleryDeck() {
    document.getElementById("theatre-screen").style.display = "none";
    document.getElementById("top-nav").style.display = "flex";
    document.getElementById("deck-wrapper").style.display = "block";
    document.getElementById("player-mount-point").innerHTML = ""; // Destroys previous session buffer completely
}

function renderTheatreScreen(asset) {
    document.getElementById("deck-wrapper").style.display = "none";
    document.getElementById("top-nav").style.display = "none";
    
    const theatre = document.getElementById("theatre-screen");
    theatre.style.display = "flex";

    document.getElementById("theatre-title-text").textContent = asset.name;
    document.getElementById("theatre-meta-tags").innerHTML = `
        <span class="micro-tag">Size: ${asset.size}</span>
        <span class="micro-tag">Resolution: ${asset.res}</span>
    `;

    // Pure layout embedding using exact structural requirements requested
    document.getElementById("player-mount-point").innerHTML = `
        <video-player>
          <video-skin>
            <video src="${asset.video}" playsinline controls autoplay></video>
          </video-skin>
        </video-player>
    `;
    window.scrollTo({ top: 0, behavior: 'instant' });
}

// --- Live Processing Filtering Input Event ---
liveFilter.oninput = (e) => {
    const query = e.target.value.toLowerCase().trim();
    buildDeck(assets.filter(a => a.name.toLowerCase().includes(query)));
};

// --- History Engine Sync (Device Back/Forward Actions) ---
window.onpopstate = (e) => {
    if (e.state && e.state.screen === 'player') {
        const deepMatch = assets.find(a => a.name === e.state.name);
        if (deepMatch) renderTheatreScreen(deepMatch);
    } else {
        renderGalleryDeck();
    }
};

// --- Initialization Check Execution ---
const targetSlug = window.location.pathname.split('/').filter(Boolean).pop();
const entryMatch = assets.find(a => encodeURIComponent(a.name.replace(/\.[^/.]+$/, "")) === targetSlug);

if (entryMatch) {
    renderTheatreScreen(entryMatch);
} else {
    buildDeck(assets);
}
