<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Studio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,-apple-system,sans-serif;
}

:root{
    --accent:#d4af37; /* Elegant muted gold/tan */
    --accent-glow:rgba(212,175,55,0.15);
    --bg-main:#0b0b0c;
    --bg-card:rgba(255,255,255,0.03);
    --border:rgba(255,255,255,0.08);
    --text-muted:#8a8a93;
}

body{
    background-color:var(--bg-main);
    color:#f4f4f6;
    min-height:100vh;
    overflow-x:hidden;
}

header{
    position:sticky;
    top:0;
    z-index:50;
    padding:16px 24px;
    backdrop-filter:blur(20px);
    background:rgba(11,11,12,0.8);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.search-container{
    flex:1;
    max-width:480px;
}

.search-container input{
    width:100%;
    padding:10px 16px;
    border:1px solid var(--border);
    outline:none;
    border-radius:12px;
    color:white;
    background:rgba(255,255,255,0.05);
    font-size:14px;
    transition:0.2s;
}

.search-container input:focus{
    border-color:var(--accent);
}

.video-count{
    font-size:13px;
    color:var(--text-muted);
}

/* Optimized Smaller Grid Layout */
.grid{
    max-width:1400px;
    margin:auto;
    padding:24px;
    display:grid;
    gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
}

.card{
    overflow:hidden;
    border-radius:16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    transition:transform 0.25s ease,border-color 0.25s ease;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-4px);
    border-color:var(--accent);
}

.preview{
    position:relative;
    width:100%;
    aspect-ratio:16/9; /* Standard widescreen cards */
    overflow:hidden;
    background:#000;
}

/* Handle portrait aspect ratios gracefully inside the cards */
.preview video{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
}

.info{
    padding:12px;
}

.name{
    font-weight:500;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:8px;
}

.meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.tag{
    padding:4px 8px;
    border-radius:6px;
    background:rgba(255,255,255,0.05);
    font-size:11px;
    color:var(--text-muted);
}

/* Dedicated View Layout */
.single-view-container{
    display:none;
    max-width:1100px;
    margin:auto;
    padding:40px 24px;
    flex-direction:column;
    gap:20px;
}

.back-btn{
    align-self:flex-start;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    color:white;
    padding:8px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    transition:0.2s;
}

.back-btn:hover{
    background:rgba(255,255,255,0.1);
    border-color:var(--text-muted);
}

.player-wrapper{
    width:100%;
    background:#000;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* VideoJS Component Custom Fit Overrides */
video-player {
    display:block;
    width:100%;
    height:100%;
}
media-container {
    aspect-ratio:16/9;
}

.single-info{
    margin-top:10px;
}
.single-title{
    font-size:22px;
    font-weight:600;
    color:#fff;
    margin-bottom:12px;
}

.empty{
    text-align:center;
    color:var(--text-muted);
    padding:80px;
    grid-column:1/-1;
}

::-webkit-scrollbar{
    width:8px;
}
::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.15);
    border-radius:999px;
}
::-webkit-scrollbar-thumb:hover{
    background:var(--accent);
}
</style>

<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-ui.js"></script>
</head>

<header id="main-header">

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const count = document.getElementById("count");

// Render regular items inside compact grid
function render(list) {
    grid.innerHTML = "";
    count.textContent = `${list.length} tracks registered`;

    if (!list.length) {
        grid.innerHTML = '<div class="empty">No entries match your query.</div>';
        return;
    }

    list.forEach(v => {
        const card = document.createElement("div");
        card.className = "card";
        // Clean routing string optimization
        const routeName = encodeURIComponent(v.name);
        card.onclick = () => navigateToVideo(routeName);

        card.innerHTML = `
            <div class="preview" data-src="${v.video}">
                <video muted loop preload="metadata" src="${v.video}"></video>
            </div>
            <div class="info">
                <div class="name">${v.name}</div>
                <div class="meta">
                    <div class="tag">${v.size || "N/A"}</div>
                    <div class="tag">${v.width}×${v.height}</div>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
    initHoverPreviews();
}

// Complex Event Tracking Hook: Plays exactly 3 seconds from the true chronological midpoint
function initHoverPreviews() {
    document.querySelectorAll('.preview').forEach(box => {
        const vid = box.querySelector('video');
        let playTimeout;

        box.onmouseenter = () => {
            if (vid.readyState >= 1 || vid.duration) {
                triggerMidpointPlayback(vid);
            } else {
                vid.addEventListener('loadedmetadata', () => triggerMidpointPlayback(vid), { once: true });
            }
        };

        box.onmouseleave = () => {
            clearTimeout(playTimeout);
            vid.pause();
            vid.currentTime = 0;
        };

        function triggerMidpointPlayback(v) {
            const duration = v.duration || 10; // Fallback estimate
            const midpoint = duration / 2;
            v.currentTime = midpoint;
            
            v.play().then(() => {
                playTimeout = setTimeout(() => {
                    v.pause();
                    v.currentTime = 0;
                }, 3000); // Strict 3 second cap
            }).catch(() => {});
        }
    });
}

// Router State Machine Logic
function navigateToVideo(routeName) {
    const videoName = decodeURIComponent(routeName);
    const videoData = videos.find(v => v.name === videoName);
    
    if (!videoData) return;

    // Push local browser history safe routing path standard for SPAs
    history.pushState({ type: 'video', name: videoName }, "", `./${routeName}`);
    renderSingleView(videoData);
}

function navigateToGallery() {
    history.pushState({ type: 'gallery' }, "", window.location.pathname.replace(/\/[^\/]*$/, ''));
    showGalleryView();
}

function showGalleryView() {
    document.getElementById("single-view").style.display = "none";
    document.getElementById("main-header").style.display = "flex";
    document.getElementById("grid-view").style.display = "block";
    document.getElementById("player-target").innerHTML = ""; // Destroys active single session
}

              <media-tooltip-group>

                    <media-icon name="restart" class="media-icon media-icon--restart"></media-icon>
                    <media-icon name="play" class="media-icon media-icon--play"></media-icon>
                    <media-icon name="pause" class="media-icon media-icon--pause"></media-icon>
                  </media-play-button>
                  <media-tooltip id="play-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                  <media-seek-button commandfor="seek-backward-tooltip" seconds="-10" class="media-button media-button--subtle media-button--icon media-button--seek">
                    <span class="media-icon__container"><media-icon name="seek" class="media-icon media-icon--flipped"></media-icon><span class="media-icon__label">10</span></span>
                  </media-seek-button>
                  <media-tooltip id="seek-backward-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                  <media-seek-button commandfor="seek-forward-tooltip" seconds="10" class="media-button media-button--subtle media-button--icon media-button--seek">
                    <span class="media-icon__container"><media-icon name="seek" class="media-icon"></media-icon><span class="media-icon__label">10</span></span>
                  </media-seek-button>
                  <media-tooltip id="seek-forward-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                </div>
                <div class="media-time-controls">
                  <media-time type="current" class="media-time"></media-time>
                  <media-time-slider class="media-slider">
                    <media-slider-track class="media-slider__track">
                      <media-slider-fill class="media-slider__fill"></media-slider-fill>
                      <media-slider-buffer class="media-slider__buffer"></media-slider-buffer>
                    </media-slider-track>
                    <media-slider-thumb class="media-slider__thumb"></media-slider-thumb>
                  </media-time-slider>
                  <media-time type="duration" class="media-time"></media-time>
                </div>
                <div class="media-button-group">
                  <media-mute-button commandfor="video-volume-popover" class="media-button media-button--subtle media-button--icon media-button--mute">
                    <media-icon name="volume-off" class="media-icon media-icon--volume-off"></media-icon>
                    <media-icon name="volume-low" class="media-icon media-icon--volume-low"></media-icon>
                    <media-icon name="volume-high" class="media-icon media-icon--volume-high"></media-icon>
                  </media-mute-button>
                  <media-popover id="video-volume-popover" open-on-hover delay="200" close-delay="100" side="top" class="media-surface media-popover media-popover--volume">
                    <media-volume-slider class="media-slider" orientation="vertical" thumb-alignment="edge">
                      <media-slider-track class="media-slider__track"><media-slider-fill class="media-slider__fill"></media-slider-fill></media-slider-track>
                      <media-slider-thumb class="media-slider__thumb media-slider__thumb--persistent"></media-slider-thumb>
                    </media-volume-slider>
                  </media-popover>
                  <media-fullscreen-button commandfor="fullscreen-tooltip" class="media-button media-button--subtle media-button--icon media-button--fullscreen">
                    <media-icon name="fullscreen-enter" class="media-icon media-icon--fullscreen-enter"></media-icon>
                    <media-icon name="fullscreen-exit" class="media-icon media-icon--fullscreen-exit"></media-icon>
                  </media-fullscreen-button>
                  <media-tooltip id="fullscreen-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                </div>
              </media-tooltip-group>
            </media-controls>
            <div class="media-overlay"></div>
            <media-hotkey keys="Space" action="togglePaused"></media-hotkey>
            <media-hotkey keys="f" action="toggleFullscreen"></media-hotkey>
          </media-container>
        </video-player>
    `;
    window.scrollTo({ top: 0, behavior: 'instant' });
}

// Universal Listeners
search.oninput = e => {
    const q = e.target.value.toLowerCase();
    render(videos.filter(v => 
        (v.name || "").toLowerCase().includes(q) || 
        (v.author || "").toLowerCase().includes(q)
    ));
};

// Monitor direct browser forward/backward actions dynamically
window.onpopstate = (event) => {
    if (event.state && event.state.type === 'video') {
        const targetVideo = videos.find(v => v.name === event.state.name);
        if (targetVideo) renderSingleView(targetVideo);
    } else {
        showGalleryView();
    }
};

// Application Initialisation Engine Checks
const currentPathSegment = window.location.pathname.split('/').pop();
const initialMatch = videos.find(v => encodeURIComponent(v.name) === currentPathSegment);
if (initialMatch) {
    renderSingleView(initialMatch);
} else {
    render(videos);
}
</script>
</body>
</html>
